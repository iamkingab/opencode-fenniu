name: Auto Update OpenCode

on:
  schedule:
    # 每周一检查更新
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check latest version
        id: check
        run: |
          LATEST=$(curl -fsSL https://api.github.com/repos/anomalyco/opencode/releases/latest | jq -r .tag_name)
          CURRENT=$(grep -E '^VERSION=' install.sh | head -1 | cut -d'"' -f2)
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" != "v$CURRENT" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version
        if: steps.check.outputs.update_needed == 'true'
        run: |
          NEW_VERSION='${{ steps.check.outputs.latest }}'
          NEW_VERSION=${NEW_VERSION#v}
          sed -i "s/^VERSION=".*"/VERSION="$NEW_VERSION"/" install.sh

      - name: Commit and push update
        if: steps.check.outputs.update_needed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add install.sh
          git commit -m "chore: update OpenCode to ${{ steps.check.outputs.latest }}"
          git push origin HEAD:main
